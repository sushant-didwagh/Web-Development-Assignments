<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoFood | Signup</title>
  <link rel="stylesheet" href="signup+login_style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>GoFood</h1>
      <p class="subtitle">Create your account to start ordering.</p>

      <form id="signupform" class="auth-form">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Choose a strong password" required />

        <button type="submit" class="btn btn-primary">Signup</button>
      </form>

      <p class="hint">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
