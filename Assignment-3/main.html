<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoFood | Welcome</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="page-bg"></div>
  <div class="overlay"></div>

  <main class="center-panel">
    <header class="hero">
      <h1>GoFood</h1>
      <p>Order from restaurants & manage your profile</p>
    </header>

    <section class="actions-card">
      <h2>Let's get started</h2>
      <p>Select one option to continue</p>

      <div class="btn-grid">
        <a class="btn btn-primary" href="signup.html">Signup</a>
        <a class="btn btn-secondary" href="login.html">Login</a>
      </div>
    </section>

    <footer class="hint">
      <p>
        New user → click <strong>Signup</strong>. Existing user → click
        <strong>Login</strong>.
      </p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
